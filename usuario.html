<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Volke</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- FUNDO ANIMADO -->
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo-container">
            <a href="./index.html">
                <img src="logo volke.png" alt="Logo Volke" class="logo">
            </a>
        </div>
        <nav class="nav-links">
            <a href="./imobiliaria.html">Sobre nós</a>
            <a href="./comprar.html">Comprar</a>
            <a href="./alugar.html">Alugar</a>
            <a href="./contato.html">Contato</a>
            <a href="./cliente.html">Área do Cliente</a>
        </nav>
    </header>

    <!-- ÁREA DE CADASTRO -->
    <section class="area-cliente">
        <div class="login-card">

            <!-- LOGO -->
            <div class="login-logo">
                <img src="logo volke.png" alt="Logo Volke">
            </div>

            <!-- TÍTULO -->
            <div class="login-titulo">
                <h1>Criar Conta</h1>
                <p>Preencha os dados abaixo para se cadastrar.</p>
            </div>

            <!-- FORMULÁRIO -->
            <form class="login-form">

                <div class="campo">
                    <label>Nome Completo</label>
                    <input
                        type="text"
                        placeholder="Digite seu nome"
                        id="nome_criacao">
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <input
                        type="email"
                        placeholder="Digite seu e-mail"
                        id="email_criacao">
                </div>

                <div class="campo">
                    <label>Usuário</label>
                    <input
                        type="text"
                        placeholder="Escolha um usuário"
                        id="usuario_criacao">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input
                        type="password"
                        placeholder="Escolha uma senha"
                        id="senha_criacao">
                </div>

                <button
                    type="button"
                    class="btn-login"
                    onclick="criarUsuario()">
                    Cadastrar
                </button>

                <p id="erroNovo"    style="color:red;   font-size:13px; margin-top:12px; display:none;"></p>
                <p id="sucessoNovo" style="color:green; font-size:13px; margin-top:12px; display:none;"></p>

            </form>

            <!-- LINK PARA LOGIN -->
            <div style="margin-top: 15px;">
                <a href="./cliente.html" style="
                    color: var(--azul-marinho);
                    font-size: 0.85rem;
                    text-decoration: none;
                ">
                    Já tenho uma conta
                </a>
            </div>

        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
