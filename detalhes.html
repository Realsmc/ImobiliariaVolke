<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Imóvel - Volke</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

    <div class="logo-container">
        <a href="./index.html">
            <img src="logo volke.png" alt="Logo Volke" class="logo">
        </a>
    </div>

    <nav class="nav-links">
        <a href="./imobiliaria.html">Sobre nós</a>
        <a href="./comprar.html">Comprar</a>
        <a href="./alugar.html">Alugar</a>
        <a href="./contato.html">Contato</a>
        <a href="./cliente.html">Área do Cliente</a>
    </nav>

</header>

<main class="detalhe-imovel">

    <section class="topo-imovel">

        <h1 id="titulo"></h1>

        <p class="subtitulo">
            Conforto, espaço e qualidade de vida em um só lugar
        </p>

    </section>

    <section class="galeria-imovel">

        <div class="imagem-principal">

            <button
                type="button"
                class="seta esquerda"
                id="btnAnterior">

                ❮

            </button>

            <img
                id="imagemGrande"
                src=""
                alt="Imagem do imóvel">

            <button
                type="button"
                class="seta direita"
                id="btnProximo">

                ❯

            </button>

        </div>

        <div
            class="miniaturas"
            id="miniaturas">

        </div>

    </section>

    <section class="conteudo-imovel">

        <div class="info-imovel">

            <div class="preco">
                
                <h2 id="preco"></h2>

                <h3 id="negociacao"></h3>

            </div>

            <div class="caracteristicas">

                <h3 class="item" id="tipo"></h3>

            </div>

            <div class="descricao">

                <h3>Descrição</h3>

                <p id="descricao"></p>

            </div>

            <p
                class="endereco"
                id="endereco">

            </p>

            <a
                href="https://wa.me/55999999999"
                target="_blank"
                class="btn-whatsapp">

                Entrar em Contato

            </a>

        </div>

    </section>

    <section class="localizacao">

        <h3>Localização</h3>

        <div class="mapa-container">

            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3505.456!2d-53.914!3d-28.387!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjjCsDIzJzEyLjAiUyA1M8KwNTQnNTAuNCJX!5e0!3m2!1spt-BR!2sbr!4v1620000000000"
                width="100%"
                height="400"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">

            </iframe>

        </div>

    </section>

</main>

<script src="detalhes.js"></script>

</body>
</html>
