<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Cliente - Volke</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <a href="./index.html"><img src="logo volke.png" alt="Logo Volke" class="logo"></a>
        </div>
        <nav class="nav-links">
            <a href="./comprar.html">Comprar</a>
            <a href="./alugar.html">Alugar</a>
            <a href="./pagina1.html">Lançamentos</a>
            <a href="./imobiliaria.html">Sobre nós</a>
            <a href="./contato.html">Contato</a>
            <a href="./cliente.html">Área do Cliente</a>
        </nav>
    </header>

    <section class="area-cliente">
        <div class="login-card">
            <div class="login-logo">
                <img src="logo volke.png" alt="Logo Volke">
            </div>
            
            <div class="login-titulo">
                <h1>Área do Cliente</h1>
                <p>Acesse sua conta para gerenciar seus imóveis.</p>
            </div>

            <form class="login-form">
                <div class="campo">
                    <label>Usuário</label>
                    <input type="text" placeholder="Digite seu usuário">
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite sua senha">
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div style="margin-top: 15px;">
                <a href="#" style="color: var(--azul-marinho); font-size: 0.85rem; text-decoration: none;">Esqueci minha senha</a>
            </div>
        </div>
    </section>
</body>
</html>
