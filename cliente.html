<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Área do Cliente - Volke</title>
    <link
        rel="stylesheet"
        href="style.css">
</head>

<body>

    <!-- ================================================= -->
    <!-- NAVBAR / MENU DE NAVEGAÇÃO -->
    <!-- ================================================= -->

    <header class="navbar">
        <div class="logo-container">
            <a href="./index.html">
                <img
                    src="logo volke.png"
                    alt="Logo Volke"
                    class="logo">
            </a>
        </div>

        <!-- LINKS DO MENU -->
        <nav class="nav-links">

            <a href="./imobiliaria.html">Sobre nós</a>
            <a href="./comprar.html">Comprar</a>
            <a href="./alugar.html">Alugar</a>
            <a href="./contato.html">Contato</a>
            <a href="./cliente.html">Área do Cliente</a>

        </nav>

    </header>

    <!-- ================================================= -->
    <!-- ÁREA DO CLIENTE -->
    <!-- ================================================= -->

    <section class="area-cliente">

        <!-- CARD DE LOGIN -->
        <div class="login-card">

            <!-- ========================================= -->
            <!-- LOGO -->
            <!-- ========================================= -->

            <div class="login-logo">

                <img
                    src="logo volke.png"
                    alt="Logo Volke">

            </div>

            <!-- ========================================= -->
            <!-- TÍTULO -->
            <!-- ========================================= -->

            <div class="login-titulo">

                <h1>Área do Cliente</h1>

                <p>
                    Acesse sua conta para
                    gerenciar seus imóveis.
                </p>

            </div>

            <!-- ========================================= -->
            <!-- FORMULÁRIO -->
            <!-- ========================================= -->

            <form class="login-form">

                <!-- CAMPO USUÁRIO -->
                <div class="campo">

                    <label>Usuário</label>

                    <input
                        type="text"
                        placeholder="Digite seu usuário">

                </div>

                <!-- CAMPO SENHA -->
                <div class="campo">

                    <label>Senha</label>

                    <input
                        type="password"
                        placeholder="Digite sua senha">

                </div>

                <!-- BOTÃO LOGIN -->
                <button
                    type="submit"
                    class="btn-login">

                    Entrar

                </button>

            </form>

            <!-- ========================================= -->
            <!-- LINK RECUPERAR SENHA -->
            <!-- ========================================= -->

            <div style="margin-top: 15px;">

                <a
                    href="#"
                    style="
                        color: var(--azul-marinho);
                        font-size: 0.85rem;
                        text-decoration: none;
                    ">

                    Esqueci minha senha

                </a>

            </div>

        </div>

    </section>

</body>

</html>
