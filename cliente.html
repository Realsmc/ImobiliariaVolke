<!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Imobiliária Volke</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" sizes="128x128" href="./logo volke.png">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

<body>

<!-- NAVBAR -->

<header class="navbar">
        <div class="logo-container">
            <a href="./index.html">
                <img src="logo volke.png" alt="Logo Volke" class="logo">
            </a>
            <span class="brand-name">VOLKE</span>
        </div>
    <nav class="nav-links">
        <a href="./comprar.html">Comprar</a>
        <a href="./alugar.html">Alugar</a>
        <a href="./pagina1.html">Lançamentos</a>
        <a href="./imobiliaria.html">Sobre nós</a>
        <a href="./contato.html">Contato</a>
        <a href="./cliente.html">Área do Cliente</a>
    </nav>
</header>

<!-- ÁREA LOGIN -->

<section class="area-cliente">

    <div class="login-card">

        <!-- TÍTULO -->

        <div class="login-titulo">

            <h1>
                Área do Cliente
            </h1>

            <p>
                Acesse sua conta para acompanhar seus imóveis
            </p>

        </div>

        <!-- LOGO -->

        <div class="login-logo">

            <img src="logo volke.png">

        </div>

        <!-- FORMULÁRIO -->

        <form class="login-form">

            <!-- USUÁRIO -->

            <div class="campo">

                <label>
                    Usuário
                </label>

                <input
                    type="text"
                    placeholder="Digite seu usuário"
                >

            </div>

            <!-- SENHA -->

            <div class="campo">

                <label>
                    Senha
                </label>

                <div class="senha-box">

                    <input
                        type="password"
                        placeholder="Digite sua senha"
                    >

                    <span class="olho">
                        👁
                    </span>

                </div>

            </div>

            <!-- CHECKBOX -->

            <div class="lembrar">

                <input type="checkbox">

                <span>
                    Permanecer conectado
                </span>

            </div>

            <!-- BOTÃO -->

            <button class="btn-login">

                Entrar

            </button>

        </form>

        <!-- LINK -->

        <div class="login-links">

            <a href="#">

                Esqueci minha senha

            </a>

        </div>

        <!-- FOOTER -->

        <div class="login-footer">

            <p>

                Sistema Volke Imóveis © 2026

            </p>

        </div>

    </div>

</section>

</body>
</html>
