<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - Volke</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="mesh-bg">
    <div class="mesh-blob blob-1"></div>
    <div class="mesh-blob blob-2"></div>
    <div class="mesh-blob blob-3"></div>
</div>

<header class="navbar">

    <div class="logo-container">
        <a href="index.html">
            <img src="logo volke.png" class="logo">
        </a>
    </div>

    <nav class="nav-links">
        <a href="index.html">Início</a>
        <a href="comprar.html">Comprar</a>
        <a href="alugar.html">Alugar</a>
    </nav>

</header>

<main class="admin-container">

<div class="admin-card">

<h1>Painel Administrativo</h1>

<form id="formImovel">

<div class="form-group">
<label>Título</label>
<input type="text" id="titulo" required>
</div>

<div class="form-group">
<label>Valor</label>
<input type="text" id="valor" required>
</div>

<div class="form-group">
<label>Endereço</label>
<input type="text" id="endereco" required>
</div>

<div class="form-group">
<label>Descrição</label>
<textarea id="descricao" rows="5"></textarea>
</div>

<div class="form-group">
<label>Negociação</label>

<select id="negociacao">
<option value="Venda">Venda</option>
<option value="Aluguel">Aluguel</option>
</select>
</div>

<div class="form-group">
<label>Tipo</label>

<select id="tipo">
<option value="Casa">Casa</option>
<option value="Apartamento">Apartamento</option>
</select>
</div>

<div class="form-group">
<label>Imagem Principal</label>
<input type="file" id="foto1">
</div>

<div class="form-group">
<label>Imagem 2</label>
<input type="file" id="foto2">
</div>

<div class="form-group">
<label>Imagem 3</label>
<input type="file" id="foto3">
</div>

<button type="submit" class="btn-enviar">
Salvar Imóvel
</button>

</form>

<div class="lista-imoveis">

<h2>Imóveis Cadastrados</h2>

<div id="listaImoveis"></div>

</div>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
