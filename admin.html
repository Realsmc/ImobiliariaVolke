<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - Volke</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="admin-page">

    <!-- MENU LATERAL -->
    <aside class="admin-sidebar">

        <div class="cliente-logo">
            <img src="logo volke.png" alt="">
            <h2>Volke Admin</h2>
        </div>

        <nav>
            <a href="./paineladmin.html">Usuários</a>
            <a href="./admin.html" class="ativo">Cadastrar Imóveis</a>
        </nav>

        <a href="./index.html" class="btn-sair" onclick="sair()">
            Sair
        </a>

    </aside>

    <!-- CONTEÚDO -->
    <main class="admin-content">

        <div class="admin-topo">
            <h1>Cadastrar Imóveis</h1>
        </div>

        <div class="admin-card">

            <form id="formImovel">

                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="titulo" required>
                </div>

                <div class="form-group">
                    <label>Valor</label>
                    <div class="input-preco">
                        <span>R$</span>
                        <input type="text" id="valor" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Endereço</label>
                    <input type="text" id="endereco" required>
                </div>

                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="descricao" rows="5"></textarea>
                </div>

                <div class="form-group">
                    <label>Negociação</label>

                    <select id="negociacao">
                        <option value="Venda">Venda</option>
                        <option value="Aluguel">Aluguel</option>
                    </select>

                </div>

                <div class="form-group">
                    <label>Tipo</label>

                    <select id="tipo">
                        <option value="Casa">Casa</option>
                        <option value="Apartamento">Apartamento</option>
                        <option value="Terreno">Terreno</option>
                        <option value="Sala Comercial">Sala Comercial</option>
                    </select>

                </div>

                <div class="form-group">
                    <label>Imagens</label>

                    <input
                        type="file"
                        id="fotos"
                        multiple
                        accept="image/*">
                </div>

                <button
                    type="submit"
                    class="btn-enviar">

                    Salvar Imóvel

                </button>

            </form>

             <h2>Imóveis Cadastrados</h2>

            <div id="listaImoveis"></div>

        </div>

    </main>

</div>

<script src="admin.js"></script>

</body>
