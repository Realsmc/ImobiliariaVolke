<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imobiliária Volke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" sizes="128x128" href="./logo volke.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="navbar">
    <div class="logo-container">
      <a href="./index.html">
        <img src="logo volke.png" alt="Logo Volke" class="logo">
      </a>
      <span class="brand-name">VOLKE</span>
    </div>
    <nav class="nav-links">
      <a href="./comprar.html">Comprar</a>
      <a href="./alugar.html">Alugar</a>
      <a href="#">Lançamentos</a>
      <a href="./imobiliaria.html">Sobre nós</a>
      <a href="./contato.html">Contato</a>
    </nav>
  </header>

  <section class="contato">
    <div class="contato-wrapper">

      <!-- lado do entre em contato */ -->
      <div class="contato-info">
        <h2>Entre em contato</h2>
        <p>Estamos prontos para te ajudar a encontrar o imóvel ideal.</p>

        <div class="info-item">
          <strong>Telefone:</strong>
          <p>(55) 99999-9999</p>
        </div>

        <div class="info-item">
          <strong>Email:</strong>
          <p>contato@volke.com</p>
        </div>

        <div class="info-item">
          <strong>Endereço:</strong>
          <p>Ijui - RS</p>
        </div>
        <div class="social-contato">
          <span>Siga-nos:</span>
          <div class="social-icons-small">
            <a href="#"><img src="https://images.icon-icons.com/2248/PNG/96/instagram_icon_138461.png"
                alt="Instagram"></a>
            <a href="#"><img src="https://images.icon-icons.com/694/PNG/96/Facebook_Rounded_icon-icons.com_61578.png"
                alt="Facebook"></a>
            <a href="#"><img src="https://images.icon-icons.com/38/PNG/96/linkedin_social_5085.png" alt="Linkedin"></a>
            <a href="#"><img
                src="https://images.icon-icons.com/947/PNG/96/youtube-play-button-outlined-social-symbol_icon-icons.com_74040.png"
                alt="Youtube"></a>
            <a href="#"><img src="https://images.icon-icons.com/472/PNG/48/whatsapp-48_46210.png" alt="Whatsapp"></a>
          </div>
        </div>
      </div>


      <!-- lado do fale conosco */ -->
      <div class="contato-container">
        <h1>Fale Conosco</h1>

        <form>
          <div class="form-group">
            <label>Nome</label>
            <input type="text" required>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" required>
          </div>

          <div class="form-group">
            <label>Telefone</label>
            <input type="tel">
          </div>

          <div class="form-group">
            <label>Mensagem</label>
            <textarea></textarea>
          </div>

          <button class="btn-enviar">Enviar mensagem</button>
        </form>
      </div>

    </div>
  </section>
</body>

</html>
